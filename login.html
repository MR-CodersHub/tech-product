<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cosmo Audio</title>
    <link rel="icon" type="icon/png" href="./assets/img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #f3f4f6;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .audio-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
    </style>
</head>

<body class="antialiased flex items-center justify-center min-h-screen p-6">

    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-600/5 blur-[120px] rounded-full -z-10">
    </div>

    <main class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome Back</h1>
            <p class="text-gray-400 font-light text-sm">Sign in to your account</p>
        </div>

        <div class="glass-card p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
            <form id="loginForm" class="space-y-6">

                <div class="space-y-1">
                    <label class="text-[11px] font-bold uppercase tracking-widest text-gray-500 ml-1">Email
                        Address</label>
                    <input type="email" name="email" required placeholder="name@example.com"
                        class="input-field w-full p-4 rounded-xl text-white text-sm">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[11px] font-bold uppercase tracking-widest text-gray-500">Password</label>
                        <a href="forgot-password.html"
                            class="text-[11px] font-bold text-blue-500 hover:text-blue-400 transition">Forgot?</a>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="input-field w-full p-4 rounded-xl text-white text-sm">
                </div>

                <div class="flex items-center gap-3 py-1">
                    <input type="checkbox" name="remember" id="remember"
                        class="w-4 h-4 accent-blue-600 bg-zinc-900 border-zinc-700 rounded">
                    <label for="remember" class="text-xs text-gray-400 cursor-pointer select-none">Remember me for 30
                        days</label>
                </div>

                <button type="submit"
                    class="w-full py-4 audio-gradient text-white font-bold rounded-2xl hover:opacity-90 transition-all transform active:scale-[0.98] shadow-lg shadow-blue-600/20">
                    Login
                </button>
            </form>

            <div class="mt-8">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="absolute w-full h-[1px] bg-white/5"></div>
                    <span
                        class="relative bg-[#0b0b0b] px-4 text-[10px] uppercase tracking-widest text-gray-600 font-bold">Or
                        continue with</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button
                        class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/5 hover:bg-white/5 transition text-xs font-semibold">
                        Google
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/5 hover:bg-white/5 transition text-xs font-semibold">
                        Apple
                    </button>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-white/5 text-center">
                <p class="text-xs text-gray-500">
                    Don’t have an account? <a href="signup.html"
                        class="text-white font-bold hover:text-blue-500 transition underline underline-offset-4">Create
                        one</a>
                </p>
            </div>
        </div>

        <div class="mt-10 flex flex-col items-center gap-3 text-gray-600">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span class="text-[10px] uppercase tracking-[0.2em] font-bold">Secure Authentication</span>
            </div>
            <p class="text-[10px] text-gray-700 text-center max-w-xs uppercase tracking-widest">
                Cosmo protects your data with 256-bit SSL encryption.
            </p>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            // Check for admin credentials
            if (email === 'admin@gmail.com' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true'); // Optional: store admin role
                window.location.href = 'admin-dashboard.html';
            } else {
                // Simulate successful login for regular users
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.removeItem('isAdmin'); // Ensure no stray admin key
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
